<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pack It! Outro</title>
    <style>
      :root {
        --bg-top: #1a3356;
        --bg-bottom: #040916;
        --panel-text: #f8fafc;
        --cyan-soft: #6ae7ff;
        --gold: #d9bb3f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #020617;
        color: var(--panel-text);
        font-family: "Courier New", "Lucida Console", monospace;
      }

      body {
        min-height: 100vh;
      }

      .screen {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 18%, rgba(77, 172, 255, 0.16), transparent 18%),
          radial-gradient(ellipse at top, var(--bg-top) 0%, #0d1c35 46%, var(--bg-bottom) 100%);
      }

      .grid {
        position: absolute;
        inset: 0;
        opacity: 0.12;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 38px 38px;
      }

      .stars {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .star {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.75);
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.45);
      }

      .wrap {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        width: min(80vw, 1600px);
        margin: 0 auto;
        padding: 68px 1rem 72px;
        text-align: center;
      }

      .logo {
        width: 108px;
        height: 108px;
        border-radius: 24px;
        display: grid;
        place-items: center;
        background: rgba(9, 21, 43, 0.68);
        box-shadow:
          0 0 34px rgba(86, 207, 255, 0.22),
          inset 0 0 0 1px rgba(126, 211, 255, 0.08);
      }

      .logo img {
        width: 86px;
        height: 86px;
        object-fit: contain;
        filter: drop-shadow(0 0 18px rgba(91, 227, 255, 0.35));
      }

      .logo svg {
        width: 86px;
        height: 86px;
        display: block;
        filter: drop-shadow(0 0 18px rgba(91, 227, 255, 0.35));
      }

      .lead {
        margin: 0;
        color: var(--panel-text);
        font-size: clamp(24px, 2.3vw, 40px);
        font-weight: 700;
        line-height: 1.34;
      }

      .site {
        margin: 0;
        color: var(--gold);
        font-size: clamp(40px, 4vw, 64px);
        font-weight: 700;
        letter-spacing: 0.06em;
        text-shadow: 0 0 24px rgba(242, 211, 79, 0.18);
      }

      .url {
        margin: 0;
        color: var(--cyan-soft);
        font-size: clamp(18px, 1.8vw, 28px);
      }

      @media (max-width: 720px) {
        .wrap {
          width: min(94vw, 640px);
          padding: 44px 1rem 52px;
        }
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <div class="grid"></div>
      <div class="stars" aria-hidden="true">
        <span class="star" style="left: 8%; top: 9%;"></span>
        <span class="star" style="left: 19%; top: 28%;"></span>
        <span class="star" style="left: 37%; top: 7%;"></span>
        <span class="star" style="left: 55%; top: 16%;"></span>
        <span class="star" style="left: 72%; top: 13%;"></span>
        <span class="star" style="left: 86%; top: 30%;"></span>
        <span class="star" style="left: 91%; top: 8%;"></span>
        <span class="star" style="left: 12%; top: 56%;"></span>
        <span class="star" style="left: 28%; top: 76%;"></span>
        <span class="star" style="left: 49%; top: 64%;"></span>
        <span class="star" style="left: 67%; top: 81%;"></span>
        <span class="star" style="left: 82%; top: 69%;"></span>
        <span class="star" style="left: 92%; top: 85%;"></span>
      </div>

      <div class="wrap">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" aria-label="SeeMaths logo" role="img">
            <rect x="0" y="0" width="1024" height="1024" fill="#081133"/>
            <circle cx="512" cy="360" r="60" fill="#3DB5F2"/>
            <rect x="260" y="472" width="504" height="100" rx="50" fill="#3DB5F2"/>
            <circle cx="512" cy="684" r="60" fill="#3DB5F2"/>
            <g transform="translate(-180,-40) rotate(-15 400 320)">
              <path d="M260 200 Q340 160 420 200" fill="none" stroke="#5E667A" stroke-width="14" stroke-linecap="round"/>
              <path d="M440 200 Q520 160 600 200" fill="none" stroke="#5E667A" stroke-width="14" stroke-linecap="round"/>
              <ellipse cx="360" cy="320" rx="90" ry="110" fill="#FFFFFF"/>
              <ellipse cx="390" cy="350" rx="42" ry="50" fill="#3DB5F2"/>
              <circle cx="405" cy="360" r="26" fill="#000000"/>
              <circle cx="390" cy="330" r="10" fill="#FFFFFF"/>
              <ellipse cx="520" cy="320" rx="78" ry="96" fill="#FFFFFF"/>
              <ellipse cx="545" cy="350" rx="36" ry="44" fill="#3DB5F2"/>
              <circle cx="558" cy="358" r="22" fill="#000000"/>
              <circle cx="545" cy="332" r="8" fill="#FFFFFF"/>
            </g>
          </svg>
        </div>
        <p class="lead" contenteditable="true">Play this and more games at</p>
        <p class="site" contenteditable="true">SeeMaths.com</p>
        <p class="url" contenteditable="true">www.seemaths.com</p>
      </div>
    </main>
  </body>
</html>
